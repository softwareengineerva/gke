apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: test-secrets
  namespace: secrets-demo
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/my-gcp-project/secrets/concur-test-test-secret/versions/latest"
        fileName: "concur-test-test-secret"
  secretObjects:
    - secretName: test-secret
      type: Opaque
      data:
        - objectName: concur-test-test-secret
          key: secret-data
