apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: test-secrets
  namespace: secrets-demo
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/shc-labs/secrets/concur-test-test-secret/versions/latest"
        path: "concur-test-test-secret"
        jmesPath:
          - path: "secret-data"
            objectAlias: "secret_data"
  secretObjects:
    - secretName: test-secret
      type: Opaque
      data:
        - objectName: secret_data
          key: secret-data
