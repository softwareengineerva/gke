apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
    - port: 9187
      targetPort: 9187
      protocol: TCP
      name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-ilb
  namespace: postgres
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
spec:
  loadBalancerIP: 10.0.0.250
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  type: LoadBalancer
